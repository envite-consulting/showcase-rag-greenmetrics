---
name: RAG Showcase - Full Baseline
author: envite Consulting GmbH
description: Full hosted-service baseline for comparing RAG configurations in the GMT dashboard. Keeps retrieval simple and uses a larger question workload than the lightweight default scenario.

compose-file: !include docker-compose.demo.yml

services:
  rag-app:
    environment:
      CHUNKING_STRATEGY: "simple"
      CHUNK_SIZE: 192
      CHUNK_OVERLAP: 24
      POST_BM25_RERANK: "False"
      TOP_K: 5
      OLLAMA_MODEL: "llama3:8b"
      RAG_QUESTIONS_PATH: "/src/scripts/questions.demo.json"
      RAG_QUESTION_LIMIT: 0
      MAX_TOKENS: 512

flow:
  - name: Pull Ollama Model
    container: ollama
    commands:
      - type: console
        command: ollama ls #python scripts/pull_ollama_model.py
        log-stdout: true
        read-notes-stdout: true
