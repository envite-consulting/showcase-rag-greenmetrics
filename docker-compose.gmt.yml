services:
  rag-app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: rag-app
    depends_on:
      - ollama

  ollama:
    container_name: ollama
    image: ollama/ollama@sha256:d4188c1dfa870386a14e299976aed96daeb83876b69e1a852c9d09ea76463b9f
    environment:
      OLLAMA_MODEL: llama3:8b
