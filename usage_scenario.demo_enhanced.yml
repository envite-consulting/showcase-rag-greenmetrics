---
name: RAG Showcase - Full Enhanced Retrieval
author: envite Consulting GmbH
description: Full hosted-service scenario for comparing a more structured retrieval configuration against the baseline in the GMT dashboard.

compose-file: !include docker-compose.demo.yml

services:
  rag-app:
    environment:
      CHUNKING_STRATEGY: "structure"
      CHUNK_SIZE: 192
      CHUNK_OVERLAP: 24
      POST_BM25_RERANK: "True"
      TOP_K: 5
      OLLAMA_MODEL: "llama3:8b"
      RAG_QUESTIONS_PATH: "/src/scripts/questions.demo.json"
      RAG_QUESTION_LIMIT: 0
      MAX_TOKENS: 512

flow:
  - name: Prepare Dataset
    container: rag-app
    commands:
      - type: console
        command: python scripts/get_dataset.py --selection scripts/dataset.demo.json --force
        log-stdout: true
        read-notes-stdout: true

  - name: Warmup Indexing
    container: rag-app
    commands:
      - type: console
        command: python -m app.warmup_indexing
        log-stdout: true
        read-notes-stdout: true

  - name: Indexing
    container: rag-app
    commands:
      - type: console
        command: python -m app.indexing
        log-stdout: true
        read-notes-stdout: true

  - name: Pull Ollama Model
    container: rag-app
    commands:
      - type: console
        command: python scripts/pull_ollama_model.py
        log-stdout: true
        read-notes-stdout: true

  - name: Warmup RAG
    container: rag-app
    commands:
      - type: console
        command: python -m app.warmup_rag
        log-stdout: true
        read-notes-stdout: true

  - name: RAG Queries
    container: rag-app
    commands:
      - type: console
        command: python scripts/rag_queries.py
        log-stdout: true
        read-notes-stdout: true
