---
name: RAG Showcase - Demo Small LLM
author: envite Consulting GmbH
description: Hosted GPU demo scenario for comparing the baseline retrieval setup with a smaller preloaded Ollama model. Keeps chunking, retrieval, dataset, and question workload identical to the demo baseline, but uses llama3.2:3b instead of llama3:8b.

compose-file: !include docker-compose.demo.yml

services:
  rag-app:
    environment:
      CHUNKING_STRATEGY: "simple"
      CHUNK_SIZE: 192
      CHUNK_OVERLAP: 24
      POST_BM25_RERANK: "False"
      TOP_K: 5
      OLLAMA_MODEL: "llama3.2:3b"
      RAG_QUESTIONS_PATH: "/src/scripts/questions.demo.json"
      RAG_QUESTION_LIMIT: 0
      MAX_TOKENS: 512

flow:
  - name: Prepare Dataset
    container: rag-app
    commands:
      - type: console
        command: python scripts/get_dataset.py --selection scripts/dataset.demo.json --force
        log-stdout: true
        read-notes-stdout: true

  - name: Warmup Indexing
    container: rag-app
    commands:
      - type: console
        command: python -m app.warmup_indexing
        log-stdout: true
        read-notes-stdout: true

  - name: Indexing
    container: rag-app
    commands:
      - type: console
        command: python -m app.indexing
        log-stdout: true
        read-notes-stdout: true

  - name: Warmup RAG
    container: rag-app
    commands:
      - type: console
        command: python -m app.warmup_rag
        log-stdout: true
        read-notes-stdout: true

  - name: RAG Queries
    container: rag-app
    commands:
      - type: console
        command: python scripts/rag_queries.py
        log-stdout: true
        read-notes-stdout: true
