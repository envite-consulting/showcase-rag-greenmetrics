---
name: RAG Showcase - Baseline
author: envite Consulting GmbH
description: Baseline measurement for the local GMT showcase. Uses simple chunks, all-MiniLM-L6-v2 embeddings, and llama3:8b.

compose-file: !include docker-compose.gmt.yml

flow:
  - name: Warmup Indexing
    container: rag-app
    commands:
      - type: console
        command: python -m app.warmup_indexing
        log-stdout: true
        read-notes-stdout: true

  - name: Indexing
    container: rag-app
    commands:
      - type: console
        command: python -m app.indexing
        log-stdout: true
        read-notes-stdout: true

  - name: Warmup RAG
    container: rag-app
    commands:
      - type: console
        command: python -m app.warmup_rag
        log-stdout: true
        read-notes-stdout: true

  - name: RAG Queries
    container: rag-app
    commands:
      - type: console
        command: python scripts/rag_queries.py
        log-stdout: true
        read-notes-stdout: true
