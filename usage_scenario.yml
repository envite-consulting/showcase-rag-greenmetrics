---
name: RAG Showcase - Remote Default
author: envite Consulting GmbH
description: Small default scenario for the Green Metrics Tool hosted service. Uses a tiny Ollama model and a reduced question set so remote showcase runs stay lightweight.

compose-file: !include docker-compose.gmt.yml

services:
  rag-app:
    environment:
      CHUNKING_STRATEGY: "simple"
      CHUNK_SIZE: 512
      CHUNK_OVERLAP: 64
      METADATA_FILTER: "False"
      METADATA_ENHANCEMENT: "False"
      POST_BM25_RERANK: "False"
      OLLAMA_MODEL: "tinyllama:1.1b"
      RAG_QUESTION_LIMIT: 4
      MAX_TOKENS: 256
  ollama:
    environment:
      OLLAMA_MODEL: "tinyllama:1.1b"

flow:
  - name: Prepare Dataset
    container: rag-app
    commands:
      - type: console
        command: python scripts/get_dataset.py --force
        log-stdout: true
        read-notes-stdout: true

  - name: Warmup Indexing
    container: rag-app
    commands:
      - type: console
        command: python -m app.warmup_indexing
        log-stdout: true
        read-notes-stdout: true

  - name: Indexing
    container: rag-app
    commands:
      - type: console
        command: python -m app.indexing
        log-stdout: true
        read-notes-stdout: true

  - name: Pull Ollama Model
    container: ollama
    commands:
      - type: console
        command: sh -c 'ollama pull "$OLLAMA_MODEL"'
        log-stdout: true
        read-notes-stdout: true

  - name: Warmup RAG
    container: rag-app
    commands:
      - type: console
        command: python -m app.warmup_rag
        log-stdout: true
        read-notes-stdout: true

  - name: RAG Queries
    container: rag-app
    commands:
      - type: console
        command: python scripts/rag_queries.py
        log-stdout: true
        read-notes-stdout: true
