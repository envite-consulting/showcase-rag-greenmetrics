---
name: RAG Showcase - Structured BM25
author: envite Consulting GmbH
description: Comparison configuration with structured chunking, metadata filtering, and BM25 re-ranking.

compose-file: !include docker-compose.gmt.yml

services:
  rag-app:
    environment:
      CHUNKING_STRATEGY: "structure"
      METADATA_FILTER: "True"
      POST_BM25_RERANK: "True"

flow:
  - name: Warmup Indexing
    container: rag-app
    commands:
      - type: console
        command: python -m app.warmup_indexing
        log-stdout: true
        read-notes-stdout: true

  - name: Indexing
    container: rag-app
    commands:
      - type: console
        command: python -m app.indexing
        log-stdout: true
        read-notes-stdout: true

  - name: Warmup RAG
    container: rag-app
    commands:
      - type: console
        command: python -m app.warmup_rag
        log-stdout: true
        read-notes-stdout: true

  - name: RAG Queries
    container: rag-app
    commands:
      - type: console
        command: python scripts/rag_queries.py
        log-stdout: true
        read-notes-stdout: true
