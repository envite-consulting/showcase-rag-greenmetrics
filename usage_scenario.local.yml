---
name: RAG Showcase - Local
author: envite Consulting GmbH
description: Local GMT scenario for Linux measurements. Adjust the service environment values below to test different RAG configurations.

compose-file: !include docker-compose.gmt.yml

services:
  rag-app:
    environment:
      CHUNKING_STRATEGY: "simple"
      CHUNK_SIZE: 512
      CHUNK_OVERLAP: 64
      METADATA_FILTER: "False"
      METADATA_ENHANCEMENT: "False"
      POST_BM25_RERANK: "False"
      OLLAMA_MODEL: "llama3:8b"
      RAG_QUESTION_LIMIT: 8
      MAX_TOKENS: 512

flow:
  - name: Prepare Dataset
    container: rag-app
    commands:
      - type: console
        command: python scripts/get_dataset.py --force
        log-stdout: true
        read-notes-stdout: true

  - name: Warmup Indexing
    container: rag-app
    commands:
      - type: console
        command: python -m app.warmup_indexing
        log-stdout: true
        read-notes-stdout: true

  - name: Indexing
    container: rag-app
    commands:
      - type: console
        command: python -m app.indexing
        log-stdout: true
        read-notes-stdout: true

  - name: Pull Ollama Model
    container: rag-app
    commands:
      - type: console
        command: python scripts/pull_ollama_model.py
        log-stdout: true
        read-notes-stdout: true

  - name: Warmup RAG
    container: rag-app
    commands:
      - type: console
        command: python -m app.warmup_rag
        log-stdout: true
        read-notes-stdout: true

  - name: RAG Queries
    container: rag-app
    commands:
      - type: console
        command: python scripts/rag_queries.py
        log-stdout: true
        read-notes-stdout: true
