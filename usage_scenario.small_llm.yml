---
name: RAG Showcase - Small LLM
author: envite Consulting GmbH
description: Comparison configuration with a smaller Ollama model for generation.

compose-file: !include docker-compose.gmt.yml

services:
  rag-app:
    environment:
      OLLAMA_MODEL: "tinyllama:1.1b"
  ollama:
    environment:
      OLLAMA_MODEL: "tinyllama:1.1b"

flow:
  - name: Warmup Indexing
    container: rag-app
    commands:
      - type: console
        command: python -m app.warmup_indexing
        log-stdout: true
        read-notes-stdout: true

  - name: Indexing
    container: rag-app
    commands:
      - type: console
        command: python -m app.indexing
        log-stdout: true
        read-notes-stdout: true

  - name: Warmup RAG
    container: rag-app
    commands:
      - type: console
        command: python -m app.warmup_rag
        log-stdout: true
        read-notes-stdout: true

  - name: RAG Queries
    container: rag-app
    commands:
      - type: console
        command: python scripts/rag_queries.py
        log-stdout: true
        read-notes-stdout: true
